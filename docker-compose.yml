services:
  backend:
    build:
      context: ./Derma-back-main
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "False"
      AUTH_REQUIRED: "True"
      DATABASE_URL: sqlite:///./data/skin_analysis.db
      UPLOAD_DIR: /app/uploads
      MODEL_PATH: /app/app/infrastructure/ml/weights/skin_efficientnet_b4_9.pth
      MODEL_DEVICE: cpu
      RAG_KNOWLEDGE_PATH: /app/app/data/rag/skin_data1.txt
      RAG_VECTOR_INDEX_DIR: /app/app/data/rag/vector_index
      FRONTEND_BASE_URL: http://localhost:5173
      FRONTEND_RESET_PASSWORD_URL: http://localhost:5173/reset-password
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","https://frontai.vercel.app"]'
      RAG_LLM_PROVIDER: ""
      OPENAI_API_KEY: ""
      XAI_API_KEY: ""
      GROQ_API_KEY: ""
    volumes:
      - derma_backend_data:/app/data
      - derma_backend_uploads:/app/uploads
      - derma_rag_index:/app/app/data/rag/vector_index
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./Derma-front-main
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  derma_backend_data:
  derma_backend_uploads:
  derma_rag_index:
